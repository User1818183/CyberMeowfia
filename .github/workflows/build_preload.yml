name: Build CVE-2026-43499 preload.so

on:
  workflow_dispatch:
    inputs:
      factory_image_url:
        description: 'Пряме посилання на factory image (.zip або .tar.gz)'
        required: true
        default: 'https://dl.google.com/dl/android/aosp/blueline-pq3a.190505.001-factory-5dac7196.zip'
      p0_phys_offset:
        description: 'Фізичний зсув (наприклад, 0x80000000)'
        required: true
        default: '0x80000000'
      p0_kernel_phys_load:
        description: 'Фізична адреса завантаження ядра (наприклад, 0xc7800000)'
        required: true
        default: '0xc7800000'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29
          add-to-path: false

      - name: Install dependencies (llvm, python3, jq, curl)
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm python3 python3-pip unzip wget tar jq curl

      - name: Download latest Magisk
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_JSON="$(
            curl --fail \
              --silent \
              --show-error \
              --location \
              "https://api.github.com/repos/topjohnwu/Magisk/releases/latest"
          )"

          MAGISK_URL="$(
            echo "$RELEASE_JSON" |
              jq -r '
                .assets[]
                | select(.name | test("^Magisk-v.*\\.apk$"))
                | .browser_download_url
              ' |
              head -n 1
          )"

          if [[ -z "$MAGISK_URL" || "$MAGISK_URL" == "null" ]]; then
            echo "::error::Could not find Magisk APK in latest release"
            exit 1
          fi

          echo "Downloading: $MAGISK_URL"
          curl \
            --fail \
            --location \
            --retry 3 \
            --output Magisk.apk \
            "$MAGISK_URL"

          unzip -q Magisk.apk -d magisk-apk

      - name: Extract magiskboot
        shell: bash
        run: |
          set -euo pipefail

          MAGISKBOOT="$(
            find magisk-apk \
              -type f \
              \( \
                -path "*/lib/x86_64/libmagiskboot.so" \
                -o -path "*/lib/x86/libmagiskboot.so" \
              \) |
              head -n 1
          )"

          if [[ -z "$MAGISKBOOT" ]]; then
            echo "::error::x86_64 magiskboot was not found inside Magisk APK"
            find magisk-apk -iname '*magiskboot*' -print
            exit 1
          fi

          cp "$MAGISKBOOT" ./magiskboot
          chmod +x ./magiskboot

          sudo cp ./magiskboot /usr/local/bin/magiskboot
          sudo chmod +x /usr/local/bin/magiskboot

          ./magiskboot --help || true

      - name: Create profile.json from inputs
        run: |
          jq -n \
            --arg phys "${{ github.event.inputs.p0_phys_offset }}" \
            --arg load "${{ github.event.inputs.p0_kernel_phys_load }}" \
            '{p0_phys_offset: $phys, p0_kernel_phys_load: $load}' > dynamic_profile.json
          
          echo "Згенерований dynamic_profile.json:"
          cat dynamic_profile.json

      - name: Download and extract Factory Image
        run: |
          mkdir -p firmware
          cd firmware
          
          echo "Завантаження factory image..."
          wget -q -O factory.zip "${{ github.event.inputs.factory_image_url }}"
          
          echo "Розпаковка архіву..."
          unzip -q factory.zip -d unzipped
          
          cd unzipped
          INNER_ZIP=$(find . -name "image-*.zip" -o -name "*.tar.gz" | head -n 1)
          
          if [ -z "$INNER_ZIP" ]; then
            echo "Вкладений архів не знайдено. Шукаємо boot.img..."
            find . -name "boot.img" -exec cp {} ../../boot.img \;
          else
            echo "Знайдено вкладений архів: $INNER_ZIP. Розпаковуємо..."
            if [[ "$INNER_ZIP" == *.zip ]]; then
              unzip -q "$INNER_ZIP" -d extracted_img
            else
              tar -xzf "$INNER_ZIP" -C extracted_img
            fi
            find extracted_img -name "boot.img" -exec cp {} ../../boot.img \;
          fi
          
          cd ../..
          if [ ! -f "boot.img" ]; then
            echo "Помилка: boot.img не знайдено у factory image!"
            exit 1
          fi
          echo "boot.img успішно витягнуто:"
          ls -lh boot.img

            - name: Unpack boot.img and patch kernel payload
        run: |
          mkdir -p boot_work
          cd boot_work
          cp ../boot.img .
          
          echo "Розпаковка boot.img за допомогою magiskboot..."
          magiskboot unpack boot.img
          
          if [ ! -f kernel ]; then
            echo "Помилка: kernel не знайдено після розпаковки!"
            exit 1
          fi
          
          echo "Перевірка стиснення ядра..."
          if file kernel | grep -qi "gzip"; then
            mv kernel kernel.gz && gunzip kernel.gz
          elif file kernel | grep -qi "LZ4"; then
            sudo apt-get install -y lz4
            mv kernel kernel.lz4 && lz4 -d kernel.lz4 kernel
          elif file kernel | grep -qi "bzip2"; then
            mv kernel kernel.bz2 && bunzip2 kernel.bz2
          fi

          echo "Очищення ядра від appended DTB та створення нового boot.img..."
          python3 - <<'EOF'
          import struct

          with open("boot.img", "rb") as f:
              boot = bytearray(f.read())

          if boot[:8] != b"ANDROID!":
              raise SystemExit("Помилка: вхідний файл не є Android boot image")

          header_size = struct.unpack_from("<I", boot, 20)[0]
          kernel_offset = (header_size + 4095) & ~4095

          with open("kernel", "rb") as f:
              kernel = f.read()

          # Зчитуємо справжній розмір Image з заголовка arm64 (зміщення 0x10)
          image_size = struct.unpack_from("<Q", kernel, 16)[0]
          
          if image_size < len(kernel):
              print(f"Виявлено додаткові дані (DTB/сміття) після ядра. Обрізаємо з {len(kernel)} до {image_size} байт.")
              kernel = kernel[:image_size]
          elif image_size > len(kernel):
              print("Увага: image_size більший за розмір файлу ядра!")

          # Оновлюємо розмір ядра у заголовку boot.img (зміщення 8)
          struct.pack_into("<I", boot, 8, len(kernel))

          # Склеюємо заголовок і очищене ядро
          with open("new_boot.img", "wb") as f:
              f.write(boot[:kernel_offset])
              f.write(kernel)

          print(f"Створено new_boot.img з очищеним ядром. Розмір ядра: {len(kernel)} байт.")
          EOF

          if [ ! -f new_boot.img ]; then
            echo "Помилка: не вдалося створити new_boot.img!"
            exit 1
          fi
          
          cp new_boot.img ../boot_uncompressed.img
          cd ..
          echo "Створено boot_uncompressed.img:"
          ls -lh boot_uncompressed.img

      - name: Generate target.h
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          echo "Генерація target.h з розпакованого boot.img..."
          python3 generate_target.py \
            --boot boot_uncompressed.img \
            --profile dynamic_profile.json \
            -o source/src/target.h

      - name: Build preload.so
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # Використовуємо linux-x86_64 для prebuilt, оскільки GitHub Actions працює на Ubuntu
          make -C source clean preload NDK_PREBUILT=linux-x86_64

      - name: Upload target.h artifact
        uses: actions/upload-artifact@v4
        with:
          name: target-h-generated
          path: source/src/target.h
          if-no-files-found: error

      - name: Upload preload.so artifact
        uses: actions/upload-artifact@v4
        with:
          name: preload-so
          path: source/build/bin/preload.so
          if-no-files-found: error
