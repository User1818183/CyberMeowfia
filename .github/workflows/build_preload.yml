name: Build CVE-2026-43499 preload.so

on:
  workflow_dispatch:
    inputs:
      factory_image_url:
        description: 'Пряме посилання на factory image (.zip або .tar.gz)'
        required: true
        default: 'https://dl.google.com/dl/android/aosp/blueline-pq3a.190505.001-factory-5dac7196.zip'
      p0_phys_offset:
        description: 'Фізичний зсув (наприклад, 0x80000000)'
        required: true
        default: '0x80000000'
      p0_kernel_phys_load:
        description: 'Фізична адреса завантаження ядра (наприклад, 0xc7800000)'
        required: true
        default: '0xc7800000'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29
          add-to-path: false

      - name: Install dependencies (llvm, python3, zstd, lz4)
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm python3 python3-pip unzip wget tar zstd lz4

      - name: Create profile.json from inputs
        run: |
          echo "Створення тимчасового профілю з вхідних даних..."
          cat <<EOF > dynamic_profile.json
          {
            "p0_phys_offset": "${{ github.event.inputs.p0_phys_offset }}",
            "p0_kernel_phys_load": "${{ github.event.inputs.p0_kernel_phys_load }}"
          }
          EOF
          
          echo "Згенерований dynamic_profile.json:"
          cat dynamic_profile.json

      - name: Download and extract Factory Image
        run: |
          mkdir -p firmware
          cd firmware
          
          echo "Завантаження factory image..."
          wget -q -O factory.zip "${{ github.event.inputs.factory_image_url }}"
          
          echo "Розпаковка архіву..."
          unzip -q factory.zip -d unzipped
          
          cd unzipped
          INNER_ZIP=$(find . -name "image-*.zip" -o -name "*.tar.gz" | head -n 1)
          
          if [ -z "$INNER_ZIP" ]; then
            echo "Вкладений архів не знайдено. Шукаємо boot.img..."
            find . -name "boot.img" -exec cp {} ../../boot.img \;
          else
            echo "Знайдено вкладений архів: $INNER_ZIP. Розпаковуємо..."
            if [[ "$INNER_ZIP" == *.zip ]]; then
              unzip -q "$INNER_ZIP" -d extracted_img
            else
              tar -xzf "$INNER_ZIP" -C extracted_img
            fi
            find extracted_img -name "boot.img" -exec cp {} ../../boot.img \;
          fi
          
          cd ../..
          if [ ! -f "boot.img" ]; then
            echo "Помилка: boot.img не знайдено у factory image!"
            exit 1
          fi
          echo "boot.img успішно витягнуто:"
          ls -lh boot.img

      - name: Extract, decompress, and clean kernel
        shell: python
        run: |
          import struct
          import gzip
          import bz2
          import subprocess
          import os

          with open("boot.img", "rb") as f:
              boot = bytearray(f.read())

          if boot[:8] != b"ANDROID!":
              raise SystemExit("Помилка: вхідний файл не є Android boot image")

          # Зчитуємо розмір заголовка та ядра
          header_size = struct.unpack_from("<I", boot, 20)[0]
          kernel_size = struct.unpack_from("<I", boot, 8)[0]
          
          # Ядро завжди вирівнюється на 4096 байт після заголовка
          kernel_offset = (header_size + 4095) & ~4095

          kernel_payload = boot[kernel_offset : kernel_offset + kernel_size]
          print(f"Витягнуто ядро: {len(kernel_payload)} байт")

          decompressed = None
          
          # Визначаємо тип стиснення за магічними числами
          if kernel_payload[:2] == b'\x1f\x8b': # Gzip
              print("Виявлено стиснення GZIP. Розпаковуємо...")
              decompressed = gzip.decompress(kernel_payload)
          elif kernel_payload[:4] == b'\x28\xb5\x2f\xfd': # Zstd
              print("Виявлено стиснення ZSTD. Розпаковуємо...")
              with open("kernel.zst", "wb") as f: f.write(kernel_payload)
              subprocess.run(["zstd", "-d", "-f", "kernel.zst", "-o", "kernel_dec"], check=True)
              with open("kernel_dec", "rb") as f: decompressed = f.read()
          elif kernel_payload[:4] in [b'\x02\x21\x4c\x18', b'\x04\x22\x4d\x18']: # LZ4
              print("Виявлено стиснення LZ4. Розпаковуємо...")
              with open("kernel.lz4", "wb") as f: f.write(kernel_payload)
              subprocess.run(["lz4", "-d", "-f", "kernel.lz4", "kernel_dec"], check=True)
              with open("kernel_dec", "rb") as f: decompressed = f.read()
          elif kernel_payload[:3] == b'BZh': # Bzip2
              print("Виявлено стиснення BZIP2. Розпаковуємо...")
              decompressed = bz2.decompress(kernel_payload)
          else:
              print("Стиснення не виявлено (сирий Image).")
              decompressed = kernel_payload

          # Перевіряємо наявність магічного числа ARM64
          if len(decompressed) < 0x3C or decompressed[0x38:0x3C] != b"ARM\x64":
              print("Увага: ARM64 magic не знайдено! Можливо ядро використовує незвичайний формат.")

          # Зчитуємо справжній розмір Image з заголовка arm64 (зміщення 0x10)
          image_size = struct.unpack_from("<Q", decompressed, 16)[0]
          print(f"Розмір Image з заголовка: {image_size} байт")

          # Обрізаємо зайві дані (appended DTB / сміття)
          if 0 < image_size < len(decompressed):
              print(f"Обрізаємо ядро з {len(decompressed)} до {image_size} байт (видалення appended DTB).")
              kernel = decompressed[:image_size]
          else:
              kernel = decompressed

          # Оновлюємо розмір ядра у заголовку boot.img (зміщення 8)
          struct.pack_into("<I", boot, 8, len(kernel))

          # Склеюємо заголовок (до початку ядра) і очищене ядро
          with open("boot_uncompressed.img", "wb") as f:
              f.write(boot[:kernel_offset])
              f.write(kernel)

          print(f"Успішно створено boot_uncompressed.img. Розмір ядра: {len(kernel)} байт.")

      - name: Generate target.h
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          echo "Генерація target.h з очищеного boot.img..."
          python3 generate_target.py \
            --boot boot_uncompressed.img \
            --profile dynamic_profile.json \
            -o source/src/target.h

      - name: Build preload.so
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # Використовуємо linux-x86_64 для prebuilt, оскільки GitHub Actions працює на Ubuntu
          make -C source clean preload NDK_PREBUILT=linux-x86_64

      - name: Upload target.h artifact
        uses: actions/upload-artifact@v4
        with:
          name: target-h-generated
          path: source/src/target.h
          if-no-files-found: error

      - name: Upload preload.so artifact
        uses: actions/upload-artifact@v4
        with:
          name: preload-so
          path: source/build/bin/preload.so
          if-no-files-found: error
