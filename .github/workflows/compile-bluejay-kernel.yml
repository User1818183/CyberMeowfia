name: Compile Bluejay Kernel & Extract Offsets

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Kernel branch to compile'
        required: true
        default: 'android-gs-bluejay-6.1-android16-dp'
      device_name:
        description: 'Device code name (e.g., bluejay)'
        required: true
        default: 'bluejay'
      build_version:
        description: 'Build version (e.g., BP2A.250705.008)'
        required: true
        default: 'BP2A.250705.008'
      api_level:
        description: 'Android API level'
        required: true
        default: '34'

jobs:
  compile-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          python3 \
          git \
          libssl-dev \
          libelf-dev \
          bison \
          flex \
          bc \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu \
          sudo apt-get install -y pahole

    - name: Clone Android kernel
      run: |
        git clone https://android.googlesource.com/kernel/common \
          -b ${{ github.event.inputs.kernel_branch }} \
          --depth 1 kernel_src
        cd kernel_src
        git log --oneline -5

    - name: Setup kernel config
      run: |
        cd kernel_src
        mkdir -p out
        
        # Use GKI defconfig
        make ARCH=arm64 O=out gki_defconfig
        
        # Enable debug symbols
        ./scripts/config --file out/.config \
          --enable DEBUG_INFO \
          --enable DEBUG_INFO_DWARF4 \
          --enable KALLSYMS \
          --enable KALLSYMS_ALL
        
        # Validate config
        make ARCH=arm64 O=out oldconfig

    - name: Compile kernel
      run: |
        cd kernel_src
        make ARCH=arm64 \
          O=out \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CC=aarch64-linux-gnu-gcc \
          AR=aarch64-linux-gnu-ar \
          LD=aarch64-linux-gnu-ld.bfd \
          OBJCOPY=aarch64-linux-gnu-objcopy \
          OBJDUMP=aarch64-linux-gnu-objdump \
          STRIP=aarch64-linux-gnu-strip \
          -j$(nproc)

    - name: Verify vmlinux
      run: |
        cd kernel_src
        file out/vmlinux
        ls -lh out/vmlinux
        nm -S out/vmlinux | head -20

    - name: Extract offsets using Python script
      run: |
        python3 scripts/extract_kernel_offsets.py \
          kernel_src/out/vmlinux \
          kernel_src/extracted_offsets.h

    - name: Display extracted offsets
      run: |
        echo "=== Extracted Offsets ==="
        cat kernel_src/extracted_offsets.h

    - name: Create target directory
      run: |
        mkdir -p IonStack/CVE-2026-43499/exploit/src/targets/${{ github.event.inputs.device_name }}-${{ github.event.inputs.build_version }}

    - name: Copy offsets to target.h
      run: |
        cp kernel_src/extracted_offsets.h \
           IonStack/CVE-2026-43499/exploit/src/targets/${{ github.event.inputs.device_name }}-${{ github.event.inputs.build_version }}/target.h

    - name: Test exploit compilation
      run: |
        cd IonStack/CVE-2026-43499/exploit
        make PROJECT=${{ github.event.inputs.device_name }}-${{ github.event.inputs.build_version }} \
             API=${{ github.event.inputs.api_level }} \
             info

    - name: Upload offsets artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-offsets-${{ github.event.inputs.device_name }}
        path: kernel_src/extracted_offsets.h
        retention-days: 30

    - name: Upload vmlinux artifact
      uses: actions/upload-artifact@v4
      with:
        name: vmlinux-${{ github.event.inputs.device_name }}
        path: kernel_src/out/vmlinux
        retention-days: 30

    - name: Upload target.h artifact
      uses: actions/upload-artifact@v4
      with:
        name: target-h-${{ github.event.inputs.device_name }}
        path: IonStack/CVE-2026-43499/exploit/src/targets/${{ github.event.inputs.device_name }}-${{ github.event.inputs.build_version }}/target.h
        retention-days: 30

    - name: Upload kernel config
      uses: actions/upload-artifact@v4
      with:
        name: kernel-config-${{ github.event.inputs.device_name }}
        path: kernel_src/out/.config
        retention-days: 30

    - name: Build summary
      if: always()
      run: |
        echo "========================================="
        echo "     Kernel Compilation Summary"
        echo "========================================="
        echo "Device: ${{ github.event.inputs.device_name }}"
        echo "Build Version: ${{ github.event.inputs.build_version }}"
        echo "Kernel Branch: ${{ github.event.inputs.kernel_branch }}"
        echo "API Level: ${{ github.event.inputs.api_level }}"
        echo ""
        echo "Generated Files:"
        echo "  - target.h: IonStack/CVE-2026-43499/exploit/src/targets/${{ github.event.inputs.device_name }}-${{ github.event.inputs.build_version }}/target.h"
        echo "  - vmlinux: kernel_src/out/vmlinux"
        echo "  - Offsets: kernel_src/extracted_offsets.h"
        echo ""
        echo "Compilation Status: ✓ Complete"
        echo "========================================="
